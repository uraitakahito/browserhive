services:
  # BrowserHive development container
  browserhive:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
        TZ: ${TZ:-Asia/Tokyo}
    container_name: browserhive-container
    init: true
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - zsh-history:/zsh-volume
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - TERM=${TERM}
      - GH_TOKEN=${GH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BROWSERHIVE_BROWSER_URLS=http://chromium-server-1:9222,http://chromium-server-2:9222
      - BROWSERHIVE_S3_ENDPOINT=http://minio:9000
      - BROWSERHIVE_S3_REGION=us-east-1
      - BROWSERHIVE_S3_BUCKET=browserhive
      - BROWSERHIVE_S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    tty: true
    stdin_open: true

  # Chromium Server 1 (development image, with noVNC at host:6080)
  chromium-server-1:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-1
    init: true
    ports:
      - "9222:9222"
      - "5901:5901"
      - "6080:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Chromium Server 2 (development image, with noVNC at host:6081)
  chromium-server-2:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-2
    init: true
    ports:
      - "9223:9222"
      - "5902:5901"
      - "6081:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MinIO — S3-compatible artifact store. Captures land at
  # s3://browserhive/<filename>. Console at http://localhost:9001
  # (root credentials below — overrideable via MINIO_ROOT_USER /
  # MINIO_ROOT_PASSWORD env on `docker compose up`).
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: browserhive-minio
    init: true
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - chromium-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mc ready local || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # One-shot init: create the `browserhive` bucket. `mc mb -p` is
  # idempotent (succeeds if the bucket already exists) so this also
  # safely runs on every compose up.
  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: browserhive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - chromium-network
    entrypoint:
      - "sh"
      - "-c"
      - |
        set -eu
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}
        mc mb -p local/browserhive
        echo "Bucket browserhive ready."

volumes:
  zsh-history:
    name: browserhive-zsh-history
  minio-data:
    name: browserhive-minio-data

networks:
  chromium-network:
    name: chromium-network
