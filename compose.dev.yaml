services:
  # BrowserHive development container
  browserhive:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
        TZ: ${TZ:-Asia/Tokyo}
    container_name: browserhive-container
    init: true
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - zsh-history:/zsh-volume
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - TERM=${TERM}
      - GH_TOKEN=${GH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BROWSERHIVE_BROWSER_URLS=http://chromium-server-1:9222,http://chromium-server-2:9222
      - BROWSERHIVE_OUTPUT_DIR=/app/output/capture
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
    tty: true
    stdin_open: true

  # Chromium Server 1 (development image, with noVNC at host:6080)
  chromium-server-1:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-1
    init: true
    ports:
      - "9222:9222"
      - "5901:5901"
      - "6080:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Chromium Server 2 (development image, with noVNC at host:6081)
  chromium-server-2:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-2
    init: true
    ports:
      - "9223:9222"
      - "5902:5901"
      - "6081:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  zsh-history:
    name: browserhive-zsh-history

networks:
  chromium-network:
    name: chromium-network
