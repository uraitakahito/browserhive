services:
  # BrowserHive development container
  browserhive:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
        TZ: ${TZ:-Asia/Tokyo}
    container_name: browserhive-container
    init: true
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - zsh-history:/zsh-volume
      - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - TERM=${TERM}
      - GH_TOKEN=${GH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BROWSERHIVE_BROWSER_URLS=http://chromium-server-1:9222,http://chromium-server-2:9222
      - BROWSERHIVE_S3_ENDPOINT=http://seaweedfs:8333
      - BROWSERHIVE_S3_REGION=us-east-1
      - BROWSERHIVE_S3_BUCKET=browserhive
      - BROWSERHIVE_S3_ACCESS_KEY_ID=${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    tty: true
    stdin_open: true

  # Chromium Server 1 (development image, with noVNC at host:6080)
  chromium-server-1:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-1
    init: true
    ports:
      - "9222:9222"
      - "5901:5901"
      - "6080:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Chromium Server 2 (development image, with noVNC at host:6081)
  chromium-server-2:
    build:
      context: ./chromium-server-docker
      dockerfile: docker/development/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-2
    init: true
    ports:
      - "9223:9222"
      - "5902:5901"
      - "6081:6080"
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # SeaweedFS — S3-compatible artifact store (Apache 2.0, actively
  # maintained). `weed server` starts master, volume, filer, and s3 in
  # one process via etc/seaweedfs/entrypoint.sh, which renders the s3
  # identity config from BROWSERHIVE_S3_ACCESS_KEY_ID /
  # BROWSERHIVE_S3_SECRET_ACCESS_KEY at startup.
  #
  # Ports:
  #   - 8333  S3 API (BROWSERHIVE_S3_ENDPOINT points here)
  #   - 8888  Filer UI — open http://localhost:8888/buckets/browserhive/
  #           in a browser to inspect captured artifacts.
  #   - 9333  Master HTTP (cluster status, debug)
  seaweedfs:
    image: chrislusf/seaweedfs:4.23
    container_name: browserhive-seaweedfs
    init: true
    entrypoint: ["/etc/seaweedfs/entrypoint.sh"]
    environment:
      - BROWSERHIVE_S3_ACCESS_KEY_ID=${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - ./etc/seaweedfs:/etc/seaweedfs:ro
      - seaweedfs-data:/data
    networks:
      - chromium-network
    healthcheck:
      # SeaweedFS binds to IPv4 only; `localhost` resolves to `::1` first
      # in the container and fails with "connection refused", so probe
      # 127.0.0.1 explicitly.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # One-shot init: create the `browserhive` bucket via `weed shell`.
  # Idempotent — re-running `s3.bucket.create` against an existing bucket
  # is a no-op.
  seaweedfs-init:
    image: chrislusf/seaweedfs:4.23
    container_name: browserhive-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    networks:
      - chromium-network
    entrypoint:
      - "sh"
      - "-c"
      - |
        set -eu
        echo "s3.bucket.create -name browserhive" | weed shell -master=seaweedfs:9333
        echo "Bucket browserhive ready."

volumes:
  zsh-history:
    name: browserhive-zsh-history
  seaweedfs-data:
    name: browserhive-seaweedfs-data

networks:
  chromium-network:
    name: chromium-network
