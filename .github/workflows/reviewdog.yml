name: reviewdog
on:
  pull_request:
    branches: [main, develop]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run openapi:generate
      - run: npm run openapi:gen-operations
      # reviewdog がコメントを投稿するトークンを GitHub App から実行ごとに発行する。
      # 保管する秘密は App の秘密鍵(REVIEWDOG_APP_KEY)だけで、これは無期限。
      # Dependabot PR でも動くよう、この鍵は Actions/Dependabot の両 secret store に登録する。
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: 4355270
          private-key: ${{ secrets.REVIEWDOG_APP_KEY }}
      - uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          reporter: github-pr-review
          eslint_flags: '. --max-warnings 0'
          fail_level: warning
