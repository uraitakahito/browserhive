name: reviewdog
on:
  pull_request:
    branches: [main, develop]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run openapi:generate
      - run: npm run openapi:gen-operations
      - uses: reviewdog/action-eslint@v1
        with:
          # Dependabot PR では GITHUB_TOKEN が read-only に降格 + Actions secrets が
          # 隔離されるため、Dependabot/Actions の両 secret store に同名で登録した
          # Fine-grained PAT (REVIEWDOG_PAT) を使う。両 trigger 経路で同じ参照式が解決される。
          github_token: ${{ secrets.REVIEWDOG_PAT }}
          reporter: github-pr-review
          eslint_flags: '. --max-warnings 0'
          fail_level: warning
