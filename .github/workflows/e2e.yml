name: e2e

# Full black-box E2E: brings up the real stack (meadow + chromium-server-docker +
# seaweedfs + browserhive) on Apple Container and runs the `e2e` Vitest project
# against it — exactly what a client sees. Kept OFF the per-PR path (the fast unit
# CI covers every PR). Manual dispatch only: with no self-hosted runner registered,
# the former nightly schedule just queued for 24 h and auto-cancelled every night.
#
# Runner prerequisites (self-hosted macOS 26, Apple silicon):
#   - the `container` CLI (Apple Container does not run on GitHub-hosted Linux)
#   - `brew install container-compose`
#   - one-time: `sudo container system dns create browserhive` (the project-named
#     DNS domain that makes <service>.browserhive names resolve — see
#     docker-compose.yml)
# For a Linux/GitHub-hosted E2E, port the same `test:e2e` suite to
# testcontainers (out of scope here).

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    name: Black-box E2E (real stack)
    runs-on: [self-hosted, macos]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      # `npm ci` also builds the linked meadow dep via its `prepare` script,
      # so `"meadow": "file:./meadow"` resolves its dist/.
      - name: Install dependencies
        run: npm ci

      - name: Bring up the stack
        run: container-compose --profile e2e up -d -b

      - name: Run E2E (readiness handled by the suite's globalSetup retry)
        run: npm run test:e2e

      - name: Tear down
        if: always()
        # down only covers services active under the given profiles.
        run: container-compose --profile e2e down
