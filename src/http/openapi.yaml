openapi: 3.1.0
info:
  title: BrowserHive Capture API
  version: 1.0.0
  description: |
    Web page capture API. Submits URLs to capture as PNG/JPEG screenshots
    and/or HTML. Uses fire-and-forget pattern: requests are accepted
    immediately and processed asynchronously by the capture coordinator.
  license:
    name: The Unlicense
    identifier: Unlicense
# servers[0].url is the source of truth for the SDK's default baseUrl.
# @hey-api/openapi-ts bakes it into src/http/generated/client.gen.ts at
# generation time, so example clients (e.g. examples/csv-client.ts)
# inherit it without a hardcoded fallback.
servers:
  - url: http://localhost:8080
    description: Local development server
# The Capture API is unauthenticated; declare it explicitly so the
# `security-defined` lint rule passes without per-operation duplication.
security: []
paths:
  /v1/captures:
    post:
      operationId: submitCapture
      summary: Submit a capture request
      description: |
        Accept a capture request for a single URL. Returns 202 immediately
        on acceptance; the actual capture is processed asynchronously.

        ## Filename format

        Captured files are written under the configured output directory.
        The filename is derived from the task identifiers as follows:

        | Case | Format | Example |
        |------|--------|---------|
        | With labels | `{taskId}_{labels}.{ext}` | `550e8400-..._my-label.png` |
        | Without labels | `{taskId}.{ext}` | `550e8400-....png` |
        | Labels + correlationId | `{taskId}_{correlationId}_{labels}.{ext}` | `550e8400-..._abc123_my-label.png` |
        | correlationId only | `{taskId}_{correlationId}.{ext}` | `550e8400-..._abc123.png` |
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureRequest"
            examples:
              dismissBanners:
                summary: Dismiss cookie-consent banners
                description: |
                  Captures The Guardian (which uses Sourcepoint as its
                  consent-management platform). With `dismissBanners: true`
                  the consent dialog — and any large fixed/sticky overlay
                  caught by the heuristic fallback — are removed before the
                  screenshot is taken. See the `dismissBanners` field of
                  `CaptureRequest` for the resulting `dismissReport` shape.
                value:
                  url: https://www.theguardian.com
                  labels: [guardian]
                  captureFormats:
                    png: true
                    jpeg: false
                    html: false
                  dismissBanners: true
      responses:
        "202":
          description: Request accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureAcceptance"
        "400":
          description: Validation failure
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: URL already in queue (when rejectDuplicateUrls is enabled)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: No operational workers available
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /v1/status:
    get:
      operationId: getStatus
      summary: Get capture coordinator status
      description: Returns the current status of the queue and worker pool.
      responses:
        "200":
          description: Current status of queue and workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
components:
  schemas:
    CaptureFormats:
      type: object
      description: Capture format flags. At least one must be true.
      required: [png, jpeg, html]
      additionalProperties: false
      properties:
        png:
          type: boolean
        jpeg:
          type: boolean
        html:
          type: boolean
    CaptureRequest:
      type: object
      required: [url, captureFormats]
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          description: Target URL to capture
        labels:
          type: array
          items:
            type: string
          default: []
          description: Display labels (used for filename)
        correlationId:
          type: string
          description: Correlation ID provided by the client for tracking
        captureFormats:
          $ref: "#/components/schemas/CaptureFormats"
        dismissBanners:
          type: boolean
          default: false
          description: |
            Run banner / modal dismissal before capturing. Removes known
            consent-management-platform overlays and large fixed/sticky
            overlays via heuristic.

            When enabled, the server log line for the completed task
            includes a `dismissReport`:

            ```json
            {
              "msg": "Task completed",
              "url": "https://www.theguardian.com",
              "dismissReport": {
                "framework": "Sourcepoint",
                "removedSelectors": ["[id^=\"sp_message_container\"]"],
                "removedOverlayCount": 1
              }
            }
            ```

            - `framework` — matched CMP name, or `"heuristic"` when only the fallback fired, or `null` when nothing matched.
            - `removedSelectors` — exact CSS selectors whose elements were removed in the CMP-selector pass.
            - `removedOverlayCount` — number of elements removed by the heuristic pass (fixed/sticky elements with high `z-index` that cover ≥30% of the viewport, excluding semantic landmarks).

            Best-effort: dismissal failures (including thrown errors inside
            the page) are swallowed and an empty report is returned, so a
            malformed page cannot fail the capture.
    CaptureAcceptance:
      type: object
      required: [accepted, taskId]
      additionalProperties: false
      properties:
        accepted:
          type: boolean
          description: Always true on 202 (errors return 4xx/5xx with Problem body)
        taskId:
          type: string
          format: uuid
          description: Server-generated task ID
        correlationId:
          type: string
          description: Correlation ID echoed from the request, when provided
    Problem:
      type: object
      description: RFC 7807 Problem Details
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
    WorkerHealth:
      type: string
      enum: [ready, busy, error, disconnected]
    ErrorType:
      type: string
      enum: [http, timeout, connection, internal]
    ErrorTaskInfo:
      type: object
      required: [taskId, url, labels]
      additionalProperties: false
      properties:
        taskId:
          type: string
        url:
          type: string
        labels:
          type: array
          items:
            type: string
    ErrorRecord:
      type: object
      required: [type, message, timestamp]
      additionalProperties: false
      properties:
        type:
          $ref: "#/components/schemas/ErrorType"
        message:
          type: string
        httpStatusCode:
          type: integer
        httpStatusText:
          type: string
        timeoutMs:
          type: integer
        timestamp:
          type: string
          format: date-time
        task:
          $ref: "#/components/schemas/ErrorTaskInfo"
    BrowserOptions:
      type: object
      required: [browserUrl]
      additionalProperties: false
      properties:
        browserUrl:
          type: string
    WorkerInfo:
      type: object
      required:
        - index
        - browserOptions
        - health
        - processedCount
        - errorCount
        - errorHistory
      additionalProperties: false
      properties:
        index:
          type: integer
        browserOptions:
          $ref: "#/components/schemas/BrowserOptions"
        health:
          $ref: "#/components/schemas/WorkerHealth"
        processedCount:
          type: integer
        errorCount:
          type: integer
        errorHistory:
          type: array
          items:
            $ref: "#/components/schemas/ErrorRecord"
    StatusResponse:
      type: object
      required:
        - pending
        - processing
        - completed
        - operationalWorkers
        - totalWorkers
        - isRunning
        - isDegraded
        - workers
      additionalProperties: false
      properties:
        pending:
          type: integer
        processing:
          type: integer
        completed:
          type: integer
        operationalWorkers:
          type: integer
        totalWorkers:
          type: integer
        isRunning:
          type: boolean
        isDegraded:
          type: boolean
        workers:
          type: array
          items:
            $ref: "#/components/schemas/WorkerInfo"
