# compose.dev.s3.yaml
#
# Overlay applied on top of `compose.dev.yaml` to flip the BrowserHive
# dev container from local-filesystem storage to MinIO (S3-compatible).
#
# Usage:
#   docker compose -f compose.dev.yaml -f compose.dev.s3.yaml up -d
#
# Stops with the same `down` command (the overlay file does not need to
# be repeated on `down` because compose tracks the active project).
#
# What this overrides:
#   - browserhive.environment: switches BROWSERHIVE_STORAGE to s3 and
#     wires the upstream MinIO endpoint + credentials.
#   - browserhive.depends_on: adds the new `minio-init` so the
#     bucket is created before BrowserHive's `HeadBucket` preflight runs.
#
# What this adds:
#   - `minio` service: stock MinIO image, root creds match the env set
#     above. Console at http://localhost:9001 (root credentials below).
#   - `minio-init`: one-shot `mc mb` to create the `browserhive` bucket.
#     Idempotent — re-running the overlay does not error if the bucket
#     already exists.

services:
  browserhive:
    environment:
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - TERM=${TERM}
      - GH_TOKEN=${GH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BROWSERHIVE_BROWSER_URLS=http://chromium-server-1:9222,http://chromium-server-2:9222
      - BROWSERHIVE_STORAGE=s3
      - BROWSERHIVE_S3_ENDPOINT=http://minio:9000
      - BROWSERHIVE_S3_REGION=us-east-1
      - BROWSERHIVE_S3_BUCKET=browserhive
      - BROWSERHIVE_S3_ACCESS_KEY_ID=minioadmin
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: browserhive-minio
    init: true
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - chromium-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mc ready local || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # One-shot init: create the `browserhive` bucket. `mc mb -p` is
  # idempotent (succeeds if the bucket already exists) so this also
  # safely runs on every compose up.
  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: browserhive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - chromium-network
    entrypoint:
      - "sh"
      - "-c"
      - |
        set -eu
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/browserhive
        echo "Bucket browserhive ready."

volumes:
  minio-data:
    name: browserhive-minio-data
