services:
  # BrowserHive HTTP capture server (production image)
  browserhive:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: browserhive:prod
    container_name: browserhive-prod
    init: true
    ports:
      - "8080:8080"
    # Uncomment the volumes block to mount TLS material when enabling
    # --tls-cert / --tls-key:
    # volumes:
    #   - ./certs:/app/certs:ro
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BROWSERHIVE_BROWSER_URLS=http://chromium-server-1:9222,http://chromium-server-2:9222
      # Override BROWSERHIVE_S3_ENDPOINT (and credentials) to point at an
      # external S3 — AWS, Cloudflare R2, MinIO-compatible managed
      # services. The bundled `seaweedfs` service below stays running
      # but is harmless when not used.
      - BROWSERHIVE_S3_ENDPOINT=http://seaweedfs:8333
      - BROWSERHIVE_S3_REGION=${BROWSERHIVE_S3_REGION:-us-east-1}
      - BROWSERHIVE_S3_BUCKET=${BROWSERHIVE_S3_BUCKET:-browserhive}
      - BROWSERHIVE_S3_ACCESS_KEY_ID=${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
    networks:
      - chromium-network
    depends_on:
      chromium-server-1:
        condition: service_healthy
      chromium-server-2:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/v1/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Chromium Server 1 (production)
  chromium-server-1:
    image: chromium-server:prod
    build:
      context: ./chromium-server-docker
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-1-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Chromium Server 2 (production) — shares the chromium-server:prod image with chromium-server-1
  chromium-server-2:
    image: chromium-server:prod
    build:
      context: ./chromium-server-docker
      dockerfile: docker/production/Dockerfile
      args:
        user_id: ${USER_ID}
        group_id: ${GROUP_ID}
    container_name: chromium-server-2-prod
    init: true
    networks:
      - chromium-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # SeaweedFS — S3-compatible artifact store (Apache 2.0, actively
  # maintained), self-hosted alongside the capture server. For external
  # S3 (AWS / R2 / MinIO-compatible managed services), override
  # `BROWSERHIVE_S3_ENDPOINT` on the browserhive service above; this
  # service stays running (idle) and can be removed via a compose
  # override if not needed. By default, SeaweedFS ports are NOT
  # published to the host — exposed within the chromium-network only.
  # Add a port mapping in a local override file if Filer UI access is
  # required for ad-hoc inspection.
  seaweedfs:
    image: chrislusf/seaweedfs:4.23
    container_name: browserhive-seaweedfs-prod
    init: true
    entrypoint: ["/etc/seaweedfs/entrypoint.sh"]
    environment:
      - BROWSERHIVE_S3_ACCESS_KEY_ID=${BROWSERHIVE_S3_ACCESS_KEY_ID:-browserhive}
      - BROWSERHIVE_S3_SECRET_ACCESS_KEY=${BROWSERHIVE_S3_SECRET_ACCESS_KEY:-browserhive}
    expose:
      - "8333"
      - "8888"
      - "9333"
    volumes:
      - ./etc/seaweedfs:/etc/seaweedfs:ro
      - seaweedfs-data:/data
    networks:
      - chromium-network
    healthcheck:
      # SeaweedFS binds to IPv4 only; `localhost` resolves to `::1`
      # first in the container and fails. Probe 127.0.0.1 explicitly.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  # One-shot init: create the `browserhive` bucket via `weed shell`.
  # Idempotent — re-running `s3.bucket.create` against an existing
  # bucket is a no-op.
  seaweedfs-init:
    image: chrislusf/seaweedfs:4.23
    container_name: browserhive-seaweedfs-init-prod
    depends_on:
      seaweedfs:
        condition: service_healthy
    networks:
      - chromium-network
    entrypoint:
      - "sh"
      - "-c"
      - |
        set -eu
        echo "s3.bucket.create -name ${BROWSERHIVE_S3_BUCKET:-browserhive}" | weed shell -master=seaweedfs:9333
        echo "Bucket ${BROWSERHIVE_S3_BUCKET:-browserhive} ready."

volumes:
  seaweedfs-data:
    name: browserhive-seaweedfs-prod-data

networks:
  chromium-network:
    name: chromium-network
