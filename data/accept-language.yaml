# data/accept-language.yaml — Accept-Language regression / demo fixture
#
# Hand-curated subset of data/nikkei225.yaml whose top pages respond
# differently when the upstream Accept-Language header is `ja` vs `en`.
# Two patterns are represented; the trailing comment on each entry
# names which one applies:
#
#   - redirect — final URL after the redirect chain differs between
#     ja-JP and en-US (e.g. `/` → `/ja/` vs `/en/`).
#   - content  — same final URL but `<html lang>` / Content-Language
#     differs.
#
# Add an entry by hand when a new locale-sensitive top page surfaces
# in nikkei225.yaml, with the same `# redirect: …` / `# content: …`
# comment shape used below.
#
# Usage:
#
#   node dist/examples/data-client.js \
#     --data data/accept-language.yaml --jpeg --html \
#     --accept-language "ja-JP,ja;q=0.9,en-US;q=0.8,en;q=0.7" \
#     | pino-pretty

